name: Postman API Test

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Postman environment file to run
        required: true
        default: staging
        type: choice
        options:
          - dev
          - staging

jobs:
  api-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LTJava

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman tools
        run: |
          mkdir -p reports
          npm install -g newman newman-reporter-htmlextra

      - name: Check Postman files
        id: postman
        run: |
          COLLECTION="postman/collections/backend-api.postman_collection.json"
          ENVIRONMENT="postman/environments/${{ inputs.environment }}.postman_environment.json"
          if [ -s "$COLLECTION" ] && [ -s "$ENVIRONMENT" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "collection=$COLLECTION" >> "$GITHUB_OUTPUT"
            echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Postman collection or environment is empty/missing. Skipping Newman run."
          fi

      - name: Inject environment variables
        if: steps.postman.outputs.ready == 'true'
        run: |
          sed -i 's|http://localhost:8080|${{ secrets.BASE_URL }}|g' "${{ steps.postman.outputs.environment }}"
          sed -i 's|lecturer1|${{ secrets.POSTMAN_USERNAME }}|g' "${{ steps.postman.outputs.environment }}"
          sed -i 's|123456|${{ secrets.POSTMAN_PASSWORD }}|g' "${{ steps.postman.outputs.environment }}"
          sed -i 's|PUT_ADMIN_TOKEN_HERE|${{ secrets.ADMIN_TOKEN }}|g' "${{ steps.postman.outputs.environment }}"
          sed -i 's|PUT_HOD_TOKEN_HERE|${{ secrets.HOD_TOKEN }}|g' "${{ steps.postman.outputs.environment }}"

      - name: Run Postman collection
        if: steps.postman.outputs.ready == 'true'
        run: |
          newman run "${{ steps.postman.outputs.collection }}" \
            -e "${{ steps.postman.outputs.environment }}" \
            --iteration-count 1 \
            --delay-request 20 \
            --reporters cli,htmlextra,junit,json \
            --reporter-htmlextra-export reports/newman-report.html \
            --reporter-junit-export reports/newman-report.xml \
            --reporter-json-export reports/newman-report.json

      - name: Upload HTML report
        if: always() && steps.postman.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-report
          path: LTJava/reports/newman-report.html

      - name: Upload JSON report
        if: always() && steps.postman.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newman-json-report
          path: LTJava/reports/newman-report.json

      - name: Upload JUnit report
        if: always() && steps.postman.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit-report
          path: LTJava/reports/newman-report.xml
