name: Deploy To EC2

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    permissions:
      contents: read
    env:
      APP_DIR: /home/${{ secrets.EC2_USER }}/ltjava
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set image names
        id: images
        shell: bash
        run: |
          IMAGE_TAG="${GITHUB_SHA::7}"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend=${{ secrets.DOCKERHUB_USERNAME }}/backend-service" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ secrets.DOCKERHUB_USERNAME }}/frontend-service" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./LTJava
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ steps.images.outputs.tag }}
            ${{ steps.images.outputs.backend }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ steps.images.outputs.tag }}
            ${{ steps.images.outputs.frontend }}:latest

      - name: Create EC2 env file
        shell: bash
        run: |
          cat > deploy.env <<EOF
          BACKEND_IMAGE=${{ steps.images.outputs.backend }}
          FRONTEND_IMAGE=${{ steps.images.outputs.frontend }}
          IMAGE_TAG=${{ steps.images.outputs.tag }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EOF

      - name: Ensure app directory exists
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          debug: true
          script: |
            mkdir -p ${{ env.APP_DIR }}
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} ${{ env.APP_DIR }}
            rm -rf ${{ env.APP_DIR }}/init.sql
            rm -f ${{ env.APP_DIR }}/docker-compose.ec2.yml ${{ env.APP_DIR }}/deploy.env

      - name: Precheck SSH connectivity from runner
        shell: bash
        run: |
          HOST="${{ secrets.EC2_HOST }}"
          PORT="${{ secrets.EC2_PORT || 22 }}"
          echo "Checking TCP reachability to ${HOST}:${PORT}"
          for i in 1 2 3 4 5; do
            if timeout 6 bash -c "</dev/tcp/$HOST/$PORT"; then
              echo "SSH port reachable"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 15s..."
            sleep 15
          done
          echo "SSH port is unreachable from GitHub runner. Check EC2 SG/NACL/route/firewall."
          exit 1

      - name: Upload deployment files
        id: upload_files_1
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 5m
          command_timeout: 30m
          source: docker-compose.ec2.yml,deploy.env,init.sql
          target: ${{ env.APP_DIR }}
          debug: true
          overwrite: true

      - name: Upload deployment files (retry)
        if: steps.upload_files_1.outcome == 'failure'
        id: upload_files_2
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 5m
          command_timeout: 30m
          source: docker-compose.ec2.yml,deploy.env,init.sql
          target: ${{ env.APP_DIR }}
          debug: true
          overwrite: true

      - name: Upload deployment files (retry 2)
        if: steps.upload_files_2.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          timeout: 5m
          command_timeout: 30m
          source: docker-compose.ec2.yml,deploy.env,init.sql
          target: ${{ env.APP_DIR }}
          debug: true
          overwrite: true

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          debug: true
          script: |
            cd ${{ env.APP_DIR }}
            mv -f docker-compose.ec2.yml docker-compose.yml
            mv -f deploy.env .env.ec2
            grep -E '^(BACKEND_IMAGE|FRONTEND_IMAGE|IMAGE_TAG)=' .env.ec2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            sudo docker compose pull
            sudo docker compose up -d --force-recreate --remove-orphans
            sudo docker image prune -f
