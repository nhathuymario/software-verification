name: Docker Publish

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

jobs:
  deploy:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    concurrency:
      group: deploy-main
      cancel-in-progress: false
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image names
        id: images
        run: |
          IMAGE_TAG="$(git rev-parse HEAD)"
          echo "tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "backend=${{ secrets.DOCKERHUB_USERNAME }}/backend-service" >> "$GITHUB_OUTPUT"
          echo "frontend=${{ secrets.DOCKERHUB_USERNAME }}/frontend-service" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        run: |
          docker build \
            -t "${{ steps.images.outputs.backend }}:${{ steps.images.outputs.tag }}" \
            -t "${{ steps.images.outputs.backend }}:latest" \
            ./LTJava
          docker push "${{ steps.images.outputs.backend }}:${{ steps.images.outputs.tag }}"
          docker push "${{ steps.images.outputs.backend }}:latest"

      - name: Build and push frontend image
        run: |
          docker build \
            -t "${{ steps.images.outputs.frontend }}:${{ steps.images.outputs.tag }}" \
            -t "${{ steps.images.outputs.frontend }}:latest" \
            ./frontend
          docker push "${{ steps.images.outputs.frontend }}:${{ steps.images.outputs.tag }}"
          docker push "${{ steps.images.outputs.frontend }}:latest"
